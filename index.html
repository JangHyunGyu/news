  <script type="application/ld+json">
  {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HN 탑10",

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --text: #e8eaf0;
      --text-muted: #7a82a0;
      --text-dim: #4a5068;
      --accent: #f6851b;
      --accent-dim: rgba(246,133,27,0.15);
      --link: #60a5fa;
      --score: #34d399;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
    }

    .logo-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-back {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-back:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      padding: 2.5rem 1.5rem 2rem;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-dim);
      border: 1px solid rgba(246,133,27,0.3);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .hero-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .hero-date {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── News List ── */
    .news-list {
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      padding: 0 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.25rem 1.25rem 1rem;
      display: flex;
      gap: 1rem;
      transition: border-color 0.2s, background 0.2s;
      animation: fadeUp 0.4s ease both;
      animation-delay: calc(var(--i) * 0.05s);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .news-card:hover {
      border-color: rgba(246,133,27,0.4);
      background: var(--surface2);
    }

    .news-rank {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-dim);
      min-width: 2rem;
      text-align: center;
      line-height: 1.4;
      padding-top: 0.1rem;
    }

    .news-card:nth-child(1) .news-rank { color: var(--accent); }
    .news-card:nth-child(2) .news-rank { color: #e2a94e; }
    .news-card:nth-child(3) .news-rank { color: #a0aec0; }

    .news-body { flex: 1; min-width: 0; }

    .news-title {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      line-height: 1.5;
      margin-bottom: 0.4rem;
      word-break: keep-all;
      transition: color 0.2s;
    }
    .news-title:hover { color: var(--link); }

    .news-summary {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 0.6rem;
      word-break: keep-all;
    }

    .news-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.75rem;
    }

    .news-original {
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .news-score {
      color: var(--score);
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .news-hn-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border: 1px solid rgba(246,133,27,0.3);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .news-hn-link:hover { background: var(--accent-dim); }

    /* ── Skeleton ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.25rem 1.25rem 1rem;
      display: flex;
      gap: 1rem;
    }

    .skel-rank {
      width: 2rem;
      height: 1.8rem;
      border-radius: 4px;
      background: var(--border);
      animation: shimmer 1.4s infinite;
    }

    .skel-body { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

    .skel-line {
      height: 1rem;
      border-radius: 4px;
      background: var(--border);
      animation: shimmer 1.4s infinite;
    }

    .skel-line.short { width: 60%; }
    .skel-line.xshort { width: 35%; }

    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ── Empty / Error ── */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }
    .empty-sub { font-size: 0.85rem; margin-top: 0.5rem; color: var(--text-dim); }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      .news-original { display: none; }
      .hero { padding: 1.5rem 1rem 1.5rem; }
      .news-list { padding: 0 1rem 2rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="header-logo" href="/">
    <div class="logo-icon">HN</div>
    <span class="logo-text">HN 탑10</span>
  </a>
  <a class="header-back" href="https://archerlab.dev">← ArcherLab</a>
</header>

<main>
  <section class="hero">
    <div class="hero-badge">
      <span id="badge-dot">●</span>
      <span id="badge-text">로딩 중...</span>
    </div>
    <h1 class="hero-title">오늘의 Hacker News 탑10</h1>
    <p class="hero-date" id="hero-date"></p>
  </section>

  <section class="news-list" id="news-list" aria-label="뉴스 목록">
    <!-- 스켈레톤 로딩 -->
    ${Array.from({length: 5}).map(() => `
    <div class="skeleton">
      <div class="skel-rank"></div>
      <div class="skel-body">
        <div class="skel-line"></div>
        <div class="skel-line short"></div>
        <div class="skel-line xshort"></div>
      </div>
    </div>`).join('')}
  </section>
</main>

<footer>
  <p>
    매일 밤 11시(KST) 자동 업데이트 ·
    원문 출처 <a href="https://news.ycombinator.com" target="_blank" rel="noopener">Hacker News</a> ·
    <a href="https://archerlab.dev">ArcherLab</a>
  </p>
</footer>

<script>
  const API = '/api/news';

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  async function loadNews() {
    const params = new URLSearchParams(location.search);
    const date = params.get('date') || new Date().toISOString().split('T')[0];

    const badgeText = document.getElementById('badge-text');
    const heroDate = document.getElementById('hero-date');
    const newsList = document.getElementById('news-list');

    try {
      const res = await fetch(`${API}?date=${date}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { news, date: resDate } = await res.json();

      const isToday = resDate === new Date().toISOString().split('T')[0];
      badgeText.textContent = isToday ? '오늘 업데이트' : '아카이브';

      heroDate.textContent = new Date(resDate + 'T00:00:00').toLocaleDateString('ko-KR', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'short',
      });

      if (!news.length) {
        newsList.innerHTML = `
          <div class="empty">
            <p>아직 오늘의 뉴스가 없습니다.</p>
            <p class="empty-sub">매일 밤 11시(KST)에 자동으로 업데이트됩니다.</p>
          </div>`;
        return;
      }

      newsList.innerHTML = news.map((item, i) => `
        <article class="news-card" style="--i:${i}">
          <div class="news-rank">${item.rank}</div>
          <div class="news-body">
            <a class="news-title" href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(item.translated_title)}
            </a>
            <p class="news-summary">${escapeHtml(item.summary || '')}</p>
            <div class="news-meta">
              <span class="news-original" title="원문 제목">${escapeHtml(item.original_title)}</span>
              <span class="news-score">▲ ${item.score}</span>
              <a class="news-hn-link" href="https://news.ycombinator.com/item?id=${item.hn_id}" target="_blank" rel="noopener">HN 토론</a>
            </div>
          </div>
        </article>`).join('');

    } catch (err) {
      badgeText.textContent = '오류';
      newsList.innerHTML = `
        <div class="empty">
          <p>뉴스를 불러오지 못했습니다.</p>
          <p class="empty-sub">${escapeHtml(err.message)}</p>
        </div>`;
    }
  }

  loadNews();
</script>

</body>
