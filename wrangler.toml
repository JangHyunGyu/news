name = "news"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 14 * * *"]  # 매일 UTC 14:00 = KST 23:00

[[d1_databases]]
binding = "DB"
database_name = "hn-news-db"
database_id = "4ecff3c0-3def-418e-9861-db758727140e"

[vars]
SITE_URL = "https://news.archerlab.dev/hn"

# wrangler secret put GEMINI_API_KEY 으로 등록
# wrangler secret put TRIGGER_KEY 으로 등록 (수동 트리거용 비밀키)
