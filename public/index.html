<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HN 탑10 | news.archerlab.dev</title>
  <meta name="description" content="Hacker News 탑10 기사를 매일 한국어로 번역해서 보여주는 서비스입니다." />
  <meta property="og:title" content="HN 탑10 — 오늘의 해커뉴스 한국어 요약" />
  <meta property="og:description" content="Hacker News 탑10 기사를 매일 한국어로 번역해서 보여주는 서비스입니다." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://news.archerlab.dev/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a3a;
      --text: #e8eaf0;
      --text-muted: #7a82a0;
      --accent: #f6851b;
      --accent-dim: rgba(246,133,27,0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      word-break: keep-all;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 10px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .back {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .back a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .back a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-icon">HN</div>
    <h1>오늘의 Hacker News 탑10</h1>
    <p>매일 밤 11시(KST), Hacker News 인기 기사 10개를<br>한국어로 번역·요약해서 보여줍니다.</p>
    <a class="btn" href="/hn">뉴스 보러가기 →</a>
    <p class="back"><a href="https://archerlab.dev">← ArcherLab</a></p>
  </div>
</body>
</html>
